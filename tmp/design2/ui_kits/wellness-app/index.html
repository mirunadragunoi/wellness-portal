<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wellness Portal — Midnight Bloom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#070d1a; --bg2:#0d1628;
  --glass:rgba(255,255,255,0.055); --glass-border:rgba(255,255,255,0.10); --glass-hover:rgba(255,255,255,0.09);
  --violet:#a78bfa; --teal:#2dd4bf; --rose:#f9a8d4; --blue:#7c9fff; --amber:#fbbf24;
  --text:#e8edf8; --muted:rgba(232,237,248,0.55); --faint:rgba(232,237,248,0.3);
  --font-d:'Cinzel',Georgia,serif; --font-b:'Nunito',system-ui,sans-serif;
  --r:16px; --r-sm:10px; --r-lg:24px; --r-xl:32px; --r-full:999px;
  --ease:cubic-bezier(.4,0,.2,1);
  --nb:66px; --bb:62px;
  --pad:clamp(16px,3vw,56px);
}
html { font-size:16px; }
body { font-family:var(--font-b); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; overflow-x:hidden; min-height:100vh; }
#root { min-height:100vh; position:relative; }
a { color:inherit; text-decoration:none; } button { font-family:var(--font-b); cursor:pointer; border:none; background:none; }
input,select,textarea { font-family:var(--font-b); } ul { list-style:none; } img { max-width:100%; display:block; }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-thumb { background:rgba(167,139,250,.3); border-radius:2px; }

.container { width:100%; max-width:1200px; margin:0 auto; padding:0 var(--pad); }
.section { padding:88px 0; }

/* ── Image slot system ── */
[data-img-slot] { position:relative; overflow:hidden; }
[data-img-slot] img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.img-placeholder-label {
  position:absolute; bottom:8px; right:8px; z-index:2;
  background:rgba(167,139,250,.2); border:1px solid rgba(167,139,250,.3);
  border-radius:4px; padding:3px 8px;
  font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:rgba(167,139,250,.8);
  pointer-events:none;
}

/* ── Glass utility ── */
.glass { background:var(--glass); border:1px solid var(--glass-border); border-radius:var(--r); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }

/* ── Animations ── */
@keyframes fadeUp   { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }
@keyframes breathe  { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.2);opacity:1} }
@keyframes breathe-ring { 0%,100%{transform:scale(1);opacity:.25} 50%{transform:scale(1.4);opacity:.06} }
@keyframes pulse-glow { 0%,100%{box-shadow:0 0 30px rgba(167,139,250,.15)} 50%{box-shadow:0 0 70px rgba(167,139,250,.4),0 0 100px rgba(45,212,191,.1)} }
@keyframes spin-breath { 0%{transform:rotate(0deg) scale(1)} 50%{transform:rotate(180deg) scale(1.05)} 100%{transform:rotate(360deg) scale(1)} }
@keyframes wave { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.7)} }
@keyframes float-up { 0%{opacity:0;transform:translateY(30px)} 30%{opacity:1} 100%{opacity:0;transform:translateY(-60px)} }
@keyframes progress-fill { from{width:0} to{width:var(--target-w,60%)} }
@keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
@keyframes dot-bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }

.page-in { animation:fadeUp .35s var(--ease) both; }

/* ── Responsive ── */
@media(max-width:768px) {
  :root { --nb:58px; --bb:58px; }
  .section { padding:52px 0; }
  .hide-mobile { display:none !important; }
}
@media(min-width:769px) {
  .hide-desktop { display:none !important; }
}

/* ── Mini player ── */
.mini-player {
  position:fixed; bottom:var(--bb); left:0; right:0; z-index:80;
  background:rgba(7,13,26,.92); backdrop-filter:blur(20px);
  border-top:1px solid rgba(167,139,250,.2);
  padding:10px var(--pad);
  display:flex; align-items:center; gap:14px;
  animation:fadeUp .3s var(--ease) both;
}

/* ── Onboarding progress ── */
.ob-bar { height:3px; background:rgba(255,255,255,.08); border-radius:var(--r-full); overflow:hidden; }
.ob-bar-fill { height:100%; background:linear-gradient(90deg,var(--violet),var(--teal)); border-radius:var(--r-full); transition:width .5s var(--ease); }

/* ── Breathing circle ── */
.breath-core { border-radius:50%; animation:breathe var(--breath-dur,4s) ease-in-out infinite; }
.breath-ring1 { border-radius:50%; border:1px solid rgba(167,139,250,.2); animation:breathe-ring var(--breath-dur,4s) ease-in-out infinite; }
.breath-ring2 { border-radius:50%; border:1px solid rgba(45,212,191,.15); animation:breathe-ring var(--breath-dur,4s) ease-in-out infinite .5s; }

/* ── Player scrubber ── */
input[type=range] { -webkit-appearance:none; width:100%; height:4px; background:rgba(255,255,255,.1); border-radius:2px; outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:white; cursor:pointer; box-shadow:0 0 8px rgba(167,139,250,.5); }
input[type=range].violet::-webkit-slider-thumb { background:var(--violet); }
</style>
</head>
<body>
<canvas id="bg-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>
<div id="root"></div>
<script>
(function(){
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  const orbs=[
    {x:.15,y:.2,r:.35,color:'rgba(124,159,255,',speed:.00007,offset:0},
    {x:.75,y:.15,r:.30,color:'rgba(167,139,250,',speed:.00009,offset:2},
    {x:.5,y:.65,r:.28,color:'rgba(45,212,191,',speed:.00006,offset:4},
    {x:.85,y:.7,r:.22,color:'rgba(249,168,212,',speed:.00008,offset:1.5},
    {x:.1,y:.75,r:.20,color:'rgba(251,191,36,',speed:.00005,offset:3},
  ];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    orbs.forEach(o=>{
      const ph=t*o.speed+o.offset;
      const px=(o.x+Math.sin(ph)*.06)*W;
      const py=(o.y+Math.cos(ph*.7)*.08)*H;
      const rad=o.r*Math.min(W,H);
      const g=ctx.createRadialGradient(px,py,0,px,py,rad);
      g.addColorStop(0,o.color+'0.12)');
      g.addColorStop(.5,o.color+'0.06)');
      g.addColorStop(1,o.color+'0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(px,py,rad,0,Math.PI*2); ctx.fill();
    });
    t++; requestAnimationFrame(draw);
  }
  draw();
})();
</script>
<div style="position:relative;z-index:1;" id="app-shell">
  <!-- React mounts here -->
</div>
<script type="text/babel" src="Layout.jsx"></script>
<script type="text/babel" src="PublicPages.jsx"></script>
<script type="text/babel" src="AppPages.jsx"></script>
<script type="text/babel" src="MorePages.jsx"></script>
<script type="text/babel" src="App.jsx"></script>
</body>
</html>
